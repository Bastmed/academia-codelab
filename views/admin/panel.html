<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración — Academia CodeLab</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/estilos.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 h1">Academia CodeLab — Panel Admin</span>
    <a href="/" class="btn btn-outline-light btn-sm">Salir al sitio</a>
  </nav>

  <div class="container mt-4">

    <div class="card mb-4">
      <div class="card-header">
        <strong id="titulo-formulario">Agregar Curso</strong>
      </div>
      <div class="card-body">
        <input type="hidden" id="curso-id">
        <div class="row g-3">
          <div class="col-md-3">
            <input type="text" id="input-nombre" class="form-control" placeholder="Nombre del curso">
          </div>
          <div class="col-md-3">
            <input type="text" id="input-descripcion" class="form-control" placeholder="Descripción">
          </div>
          <div class="col-md-2">
            <input type="text" id="input-duracion" class="form-control" placeholder="Duración (ej: 8 semanas)">
          </div>
          <div class="col-md-1">
            <input type="number" id="input-precio" class="form-control" placeholder="Precio">
          </div>
          <div class="col-md-1">
            <input type="number" id="input-cupos" class="form-control" placeholder="Cupos">
          </div>
          <div class="col-md-2 d-flex gap-2">
            <button id="btn-guardar" class="btn btn-primary w-100">Guardar</button>
            <button id="btn-cancelar" class="btn btn-secondary w-100">Cancelar</button>
          </div>
        </div>
      </div>
    </div>

    <table class="table table-bordered table-striped bg-white">
      <thead class="table-dark">
        <tr>
          <th>ID</th><th>Nombre</th><th>Descripción</th><th>Duración</th>
          <th>Precio</th><th>Cupos</th><th>Acciones</th>
        </tr>
      </thead>
      <!-- {{FILAS_CURSOS}} -->
      <tbody id="cuerpo-tabla"></tbody>
    </table>

    <h4 class="mt-5 mb-3">Inscripciones recibidas</h4>
    <table class="table table-bordered table-striped bg-white">
      <thead class="table-dark">
        <tr>
          <th>Nombre</th><th>Email</th><th>Teléfono</th><th>Curso</th><th>Fecha</th>
        </tr>
      </thead>
      <tbody id="cuerpo-inscripciones"></tbody>
    </table>
  </div>

  <script src="/js/panel.js"></script>
</body>
</html>
