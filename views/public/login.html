<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Academia CodeLab</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/estilos.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">

  <div class="card shadow-sm" style="max-width:400px; width:100%;">
    <div class="card-body p-4">
      <div class="text-center mb-3">
        <h3 class="mb-0">Academia CodeLab</h3>
        <small class="text-muted">Panel de Administración</small>
      </div>

      <!-- {{MENSAJE_ERROR}} -->

      <form action="/login" method="POST" id="form-login">
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input type="text" name="usuario" id="input-usuario" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" name="password" id="input-password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Ingresar</button>
      </form>

      <div class="text-center mt-3">
        <a href="/" class="text-decoration-none small">← Volver al sitio</a>
      </div>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
